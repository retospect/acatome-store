[project]
name = "acatome-store"
version = "0.1.0"
description = "Persistent storage, dedup, metadata queries, and semantic search for acatome bundles"
requires-python = ">=3.11"
license = "MIT"
readme = "README.md"
keywords = ["scientific-papers", "storage", "semantic-search", "citations", "sqlite", "postgres"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]

[project.urls]
Homepage = "https://github.com/acatome/acatome-store"
Repository = "https://github.com/acatome/acatome-store"
Issues = "https://github.com/acatome/acatome-store/issues"

dependencies = [
    "sqlalchemy>=2.0",
    "llama-index-core>=0.11",
    "llama-index-vector-stores-chroma>=0.2",
    "chromadb>=0.5",
    "typer>=0.12",
]

[project.optional-dependencies]
postgres = [
    "psycopg[binary]>=3.0",
    "pgvector>=0.3",
]
mysql = [
    "pymysql>=1.0",
]
neo4j = [
    "neo4j>=5.0",
]

[project.scripts]
acatome-store = "acatome_store.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/acatome_store"]
